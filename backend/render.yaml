services:
  - type: web
    name: golden-expro-api
    runtime: python
    repo: https://github.com/eng-mwaweza/golden-expro
    branch: main
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://golden-expro.vercel.app"